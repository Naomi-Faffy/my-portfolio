<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contact</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>
  <nav>
    <div class="logo">Tafara <span>Chitiyo</span></div>
    <div class="nav-container">
      <div class="links">
        <a href="index.html">Home</a>
        <a href="skills.html">Skills</a>
        <a href="introduction.html">Introduction</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </nav>
  <section class="section-content" data-aos="flip-down" data-aos-duration="1500">
    <h1>Contact Me</h1>
    <form action="mailto:youremail@example.com" method="POST" enctype="text/plain">
      <input type="text" name="name" placeholder="Your Name" required><br>
      <input type="email" name="email" placeholder="Your Email" required><br>
      <textarea name="message" placeholder="Your Message" required></textarea><br>
      <button type="submit">Send</button>
    </form>
    <div class="social-links" data-aos="fade-up" data-aos-delay="200">
      <a href="https://linkedin.com/in/your-profile" target="_blank"><i class="fa-brands fa-linkedin"></i></a>
      <a href="https://github.com/yourusername" target="_blank"><i class="fa-brands fa-github"></i></a>
      <a href="https://facebook.com/yourusername" target="_blank"><i class="fa-brands fa-facebook"></i></a>
      <a href="https://twitter.com/yourusername" target="_blank"><i class="fa-brands fa-twitter"></i></a>
    </div>
  </section>
  <script src="script.js"></script>
  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>AOS.init({offset: 0});</script>
</body>
