<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Girly Portfolio Demo</title>
<link rel="stylesheet" href="styles.css" />
<script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>
<nav>
  <div class="logo">Pink<span>Vibes</span></div>
  <div class="nav-links">
    <a href="#">Home</a>
    <a href="#portfolio">Portfolio</a>
    <a href="#contact">Contact</a>
    <button id="toggle-mode" title="Toggle Light/Dark Mode" aria-label="Toggle Light/Dark Mode">
      <i class="fas fa-moon"></i>
    </button>
  </div>
</nav>

<main>
  <h1>Welcome to My Portfolio</h1>
  <div class="typewriter">Creating with <span>Passion & Style</span></div>
  <p>Elegant designs and heartfelt creations made just for you — let’s make something beautiful together.</p>
  <a href="assets/CV_MyName.pdf" download class="btn">Download CV</a>
  <div class="social-icons">
    <i class="fab fa-instagram"></i>
    <i class="fab fa-pinterest"></i>
    <i class="fab fa-dribbble"></i>
  </div>
</main>

<section id="contact">
  <h2>Contact Me</h2>
  <form action="https://formspree.io/f/your-form-id" method="POST">
    <input type="text" name="name" placeholder="Your name" required />
    <input type="email" name="email" placeholder="Your email" required />
    <textarea name="message" placeholder="Your message" required></textarea>
    <button type="submit">Send Message</button>
  </form>
</section>

<script src="script.js"></script>
</body>
</html>
